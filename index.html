<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Surprise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sorry-message {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .gift-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gift-container:hover {
            transform: scale(1.05);
        }

        .gift-box {
            width: 150px;
            height: 120px;
            background: #e74c3c;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .gift-lid {
            width: 150px;
            height: 30px;
            background: #c0392b;
            position: absolute;
            top: -15px;
            border-radius: 8px 8px 4px 4px;
            transition: all 0.8s ease;
            transform-origin: bottom;
            z-index: 2;
        }

        .gift-box.opened .gift-lid {
            transform: rotateX(-120deg) translateY(-20px);
        }

        .ribbon-vertical {
            width: 20px;
            height: 120px;
            background: #f1c40f;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .ribbon-horizontal {
            width: 150px;
            height: 20px;
            background: #f1c40f;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .bow {
            width: 40px;
            height: 30px;
            background: #f39c12;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            z-index: 3;
        }

        .bow::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #e67e22;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .birthday-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .birthday-message.show {
            opacity: 1;
            visibility: visible;
            animation: bounceIn 0.8s ease;
        }

        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0.3); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            70% { transform: translate(-50%, -50%) scale(0.9); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .birthday-text {
            font-size: 2.5rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .pillu-text {
            font-size: 3rem;
            color: #8e44ad;
            font-weight: bold;
            background: linear-gradient(45deg, #e74c3c, #f39c12, #27ae60, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 2s linear infinite;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f39c12;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 18px;
            animation: heart-float 4s ease-in-out infinite;
            z-index: 5;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 18px;
            border-radius: 12px 12px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::before {
            left: 6px;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart.pink::before,
        .heart.pink::after {
            background: #ff69b4;
        }

        .heart.red::before,
        .heart.red::after {
            background: #e74c3c;
        }

        .heart.purple::before,
        .heart.purple::after {
            background: #9b59b6;
        }

        .heart.blue::before,
        .heart.blue::after {
            background: #3498db;
        }

        .heart.green::before,
        .heart.green::after {
            background: #27ae60;
        }

        @keyframes heart-float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                scale: 0.8;
            }
            25% {
                transform: translateY(-25vh) rotate(90deg);
                scale: 1.2;
            }
            50% {
                transform: translateY(-50vh) rotate(180deg);
                scale: 1;
            }
            75% {
                transform: translateY(-75vh) rotate(270deg);
                scale: 1.1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
                scale: 0.5;
            }
        }

        .heart-explosion {
            position: absolute;
            width: 15px;
            height: 13px;
            animation: heart-explosion 2s ease-out forwards;
        }

        .heart-explosion::before,
        .heart-explosion::after {
            content: '';
            position: absolute;
            width: 9px;
            height: 13px;
            background: #ff1744;
            border-radius: 9px 9px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-explosion::before {
            left: 4.5px;
        }

        .heart-explosion::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heart-explosion {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.5) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }

        .click-hint {
            color: white;
            font-size: 1.2rem;
            margin-top: 30px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="sorry-message">Sorry! 😔</div>
    
    <div class="gift-container" id="giftContainer">
        <div class="gift-box" id="giftBox">
            <div class="gift-lid"></div>
            <div class="ribbon-vertical"></div>
            <div class="ribbon-horizontal"></div>
            <div class="bow"></div>
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">Click the gift box! 🎁</div>
    
    <div class="birthday-message" id="birthdayMessage">
        <div class="birthday-text">Happy Birthday</div>
        <div class="pillu-text">Pillu! 🎉</div>
    </div>

    <script>
        const giftContainer = document.getElementById('giftContainer');
        const giftBox = document.getElementById('giftBox');
        const birthdayMessage = document.getElementById('birthdayMessage');
        const clickHint = document.getElementById('clickHint');

        let isOpened = false;

        giftContainer.addEventListener('click', function() {
            if (!isOpened) {
                // Open the gift box
                giftBox.classList.add('opened');
                
                // Hide click hint
                clickHint.style.opacity = '0';
                
                // Create immediate heart explosion from the box
                createHeartExplosion();
                
                // Show birthday message after a delay
                setTimeout(() => {
                    birthdayMessage.classList.add('show');
                    createConfetti();
                    createFloatingHearts();
                }, 800);
                
                isOpened = true;
            }
        });

        function createHeartExplosion() {
            const giftRect = giftContainer.getBoundingClientRect();
            const centerX = giftRect.left + giftRect.width / 2;
            const centerY = giftRect.top + giftRect.height / 2;
            
            // Create explosion hearts from the gift box center
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-explosion';
                    heart.style.left = centerX + 'px';
                    heart.style.top = centerY + 'px';
                    
                    // Random direction for explosion
                    const angle = (i * 30) * Math.PI / 180;
                    const distance = 100 + Math.random() * 50;
                    const endX = centerX + Math.cos(angle) * distance;
                    const endY = centerY + Math.sin(angle) * distance;
                    
                    heart.style.setProperty('--end-x', endX + 'px');
                    heart.style.setProperty('--end-y', endY + 'px');
                    
                    document.body.appendChild(heart);
                    
                    // Animate to final position
                    setTimeout(() => {
                        heart.style.transform = `translate(${endX - centerX}px, ${endY - centerY}px) scale(0)`;
                    }, 10);
                    
                    // Remove heart after animation
                    setTimeout(() => {
                        if (heart.parentNode) {
                            heart.parentNode.removeChild(heart);
                        }
                    }, 2000);
                }, i * 50);
            }
        }

        function createFloatingHearts() {
            const colors = ['pink', 'red', 'purple', 'blue', 'green'];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart ' + colors[Math.floor(Math.random() * colors.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.bottom = '-20px';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    
                    // Add some horizontal drift
                    const drift = (Math.random() - 0.5) * 200;
                    heart.style.setProperty('--drift', drift + 'px');
                    
                    document.body.appendChild(heart);
                    
                    // Remove heart after animation
                    setTimeout(() => {
                        if (heart.parentNode) {
                            heart.parentNode.removeChild(heart);
                        }
                    }, 6000);
                }, i * 150);
            }
        }

        function createConfetti() {
            const colors = ['#e74c3c', '#f39c12', '#27ae60', '#3498db', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    // Remove confetti after animation
                    setTimeout(() => {
                        if (confetti.parentNode) {
                            confetti.parentNode.removeChild(confetti);
                        }
                    }, 5000);
                }, i * 100);
            }
        }

        // Add some floating animation to the gift box
        setInterval(() => {
            if (!isOpened) {
                giftContainer.style.animation = 'none';
                setTimeout(() => {
                    giftContainer.style.animation = 'pulse 2s infinite';
                }, 10);
            }
        }, 4000);
    </script>
</body>
</html>
