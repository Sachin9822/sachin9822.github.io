<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Pillu ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* Initial View Styles */
        #intro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .sorry-text {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #ffb3b3;
            text-shadow: 0 0 10px rgba(255, 179, 179, 0.5);
            animation: breathe 3s infinite ease-in-out;
        }

        .gift-box {
            font-size: 6rem;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: wiggle 2s infinite ease-in-out;
            transition: transform 0.3s;
        }

        .gift-box:hover {
            transform: scale(1.1);
            animation: none;
        }

        .click-me {
            margin-top: 1rem;
            font-size: 1rem;
            color: #aaaaaa;
            opacity: 0.8;
            animation: pulse 1.5s infinite;
        }

        /* Hidden Birthday View Styles */
        #birthday-container {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
        }

        .bday-text {
            font-size: 4.5rem;
            font-weight: bold;
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.8), 0 0 40px rgba(255, 77, 77, 0.4);
            margin: 0;
            line-height: 1.2;
        }

        .bday-subtext {
            font-size: 1.5rem;
            color: #ffd700;
            margin-top: 1rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Animations */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 20px rgba(255, 179, 179, 0.9); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-10deg); }
            20%, 40%, 60%, 80% { transform: rotate(10deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Floating Hearts Styles */
        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 1.5rem;
            animation: floatUp 4s linear forwards;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="intro-container">
        <div class="sorry-text">I'm so sorry...</div>
        <div class="gift-box" onclick="openGift()">🎁</div>
        <div class="click-me">Click to open</div>
    </div>

    <div id="birthday-container">
        <h1 class="bday-text">Happy Birthday<br>Pillu! ❤️</h1>
        <p class="bday-subtext">You mean the world to me!</p>
    </div>

    <script>
        function openGift() {
            const intro = document.getElementById('intro-container');
            const bday = document.getElementById('birthday-container');

            // Fade out intro
            intro.style.opacity = '0';
            intro.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                intro.style.display = 'none';
                
                // Show and animate birthday text
                bday.style.display = 'flex';
                
                // Trigger a reflow so the transition works
                void bday.offsetWidth; 
                
                bday.style.transition = 'opacity 1s ease-in, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                bday.style.opacity = '1';
                bday.style.transform = 'scale(1)';

                // Start the heart animation
                startHeartBurst();
                setInterval(createHeart, 300); // Keep creating hearts continuously
            }, 800);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Randomize heart colors
            const colors = ['#ff4d4d', '#ffb3b3', '#ff1a1a', '#ff9999'];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            heart.innerHTML = '❤';
            
            // Randomize position, size, and duration
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // Between 3 and 6 seconds
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            
            document.body.appendChild(heart);
            
            // Clean up hearts after they float off screen to prevent lag
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Create a big burst of hearts right when the box is clicked
        function startHeartBurst() {
            for(let i = 0; i < 30; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>

</body>
</html>
